<!doctype html>
<html lang="en" data-state="loading">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=320, initial-scale=1">
<title>Phillies Wire Ticker</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --bg: #0b1d33;
    --fg: #f2f2f2;
    --accent: #e81828;
    --muted: #9fb3c8;
    --chip: #13325a;
  }
  :root[data-theme="light"] {
    --bg: #f7f6f3;
    --fg: #0b1d33;
    --accent: #e81828;
    --muted: #5a6b7c;
    --chip: #e4ebf3;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, sans-serif; }
  .ticker { min-width: 320px; max-width: 100%; padding: 12px 14px; box-sizing: border-box; }
  .row { display: flex; align-items: center; gap: 10px; }
  .chip { background: var(--chip); color: var(--fg); font-size: 11px; padding: 3px 7px; border-radius: 999px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
  .chip[data-tone="live"] { background: var(--accent); color: #fff; }
  .chip[data-tone="final"] { background: #2e7d32; color: #fff; }
  .matchup { font-size: 15px; font-weight: 700; line-height: 1.25; margin-top: 8px; }
  .meta { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.3; }
  .score { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 6px; }
  .brand { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .error { color: var(--accent); font-size: 12px; }
  [data-state="loading"] .matchup::before { content: "Loading..."; color: var(--muted); }
</style>
</head>
<body>
<div class="ticker" id="ticker" role="status" aria-live="polite">
  <div class="row">
    <span class="brand">Phillies Wire</span>
    <span class="chip" id="chip">...</span>
  </div>
  <div class="matchup" id="matchup"></div>
  <div class="score" id="score" hidden></div>
  <div class="meta" id="meta"></div>
</div>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var theme = params.get("theme");
  if (theme === "light" || theme === "dark") {
    document.documentElement.setAttribute("data-theme", theme);
  }
  var feed = params.get("feed") || "../latest.json";
  var root = document.documentElement;
  var elChip = document.getElementById("chip");
  var elMatch = document.getElementById("matchup");
  var elScore = document.getElementById("score");
  var elMeta = document.getElementById("meta");

  function fmtTime(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", timeZoneName: "short" });
    } catch (e) { return iso; }
  }

  function render(data) {
    if (!data) return renderError({ message: "no data" });
    if (data.off_day || !data.game || !data.game.matchup) return renderOffDay(data);
    var mode = (data.mode || "pregame").toLowerCase();
    if (mode === "final") return renderFinal(data);
    if (mode === "live") return renderLive(data);
    return renderPregame(data);
  }

  function teams(data) {
    if (data.game && data.game.matchup) return data.game.matchup;
    if (data.hero && data.hero.headline) return data.hero.headline;
    return "";
  }

  function renderPregame(data) {
    root.setAttribute("data-state", "pregame");
    elChip.textContent = data.mode_label || "Pregame";
    elChip.removeAttribute("data-tone");
    elScore.hidden = true;
    elMatch.textContent = teams(data);
    var g = data.game || {};
    var bits = [];
    if (g.first_pitch) bits.push("First pitch " + g.first_pitch);
    if (g.venue) bits.push(g.venue);
    if (g.starters && g.starters.away && g.starters.home) {
      bits.push(g.starters.away.name + " vs " + g.starters.home.name);
    }
    elMeta.textContent = bits.join(" \u00b7 ");
  }

  function renderLive(data) {
    root.setAttribute("data-state", "live");
    elChip.textContent = "Live";
    elChip.setAttribute("data-tone", "live");
    var g = data.game || {};
    elScore.hidden = !(g.score && (g.score.home != null || g.score.away != null));
    elMatch.textContent = teams(data);
    if (g.score) {
      var away = g.score.away != null ? g.score.away : 0;
      var home = g.score.home != null ? g.score.home : 0;
      elScore.textContent = away + " - " + home;
    }
    var bits = [];
    if (g.inning) bits.push(g.inning);
    if (g.situation) bits.push(g.situation);
    elMeta.textContent = bits.join(" \u00b7 ");
  }

  function renderFinal(data) {
    root.setAttribute("data-state", "final");
    elChip.textContent = "Final";
    elChip.setAttribute("data-tone", "final");
    var g = data.game || {};
    elScore.hidden = !(g.score && (g.score.home != null || g.score.away != null));
    elMatch.textContent = teams(data);
    if (g.score) {
      var away = g.score.away != null ? g.score.away : 0;
      var home = g.score.home != null ? g.score.home : 0;
      elScore.textContent = away + " - " + home;
    }
    elMeta.textContent = g.recap_line || "";
  }

  function renderOffDay(data) {
    root.setAttribute("data-state", "offday");
    elChip.textContent = "Off day";
    elChip.removeAttribute("data-tone");
    elScore.hidden = true;
    var hero = data.hero || {};
    if (hero.next_label || hero.next_value) {
      elMatch.textContent = hero.next_label ? (hero.next_label + ": " + (hero.next_value || "")) : (hero.next_value || "");
      elMeta.textContent = "";
    } else {
      elMatch.textContent = "No upcoming game scheduled";
      elMeta.textContent = "";
    }
  }

  function renderError(err) {
    root.setAttribute("data-state", "error");
    elChip.textContent = "Offline";
    elChip.removeAttribute("data-tone");
    elScore.hidden = true;
    elMatch.textContent = "Feed unavailable";
    elMeta.innerHTML = '<span class="error">' + (err && err.message ? err.message : "unknown error") + "</span>";
  }

  function load() {
    fetch(feed, { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(render)
      .catch(renderError);
  }

  load();
  setInterval(load, 60000);
})();
</script>
</body>
</html>
