  <main class="stage">
    <header class="topbar">
      <div class="topbar-title">
        <span class="eyebrow">Season · Overview</span>
        <h1>Season at a Glance</h1>
        <span class="crumbs" data-slot="crumbs">2026 regular season</span>
      </div>
      <div class="topbar-meta">
        <span class="season-chip" data-slot="record-chip" hidden>—</span>
        <a class="icon-btn" href="../" aria-label="Back to Command Center" title="Command Center">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
        </a>
      </div>
    </header>

    <p class="season-state" data-slot="state" aria-live="polite">Loading season summary…</p>

    <section class="season-report" data-slot="report" hidden>

      <div class="kpi-grid" data-slot="kpis" role="list"></div>

      <div class="season-cols">
        <article class="season-card">
          <header class="card-head">
            <span class="card-eyebrow">Splits</span>
            <span class="card-status">Win rate</span>
          </header>
          <div class="split-list" data-slot="splits"></div>
        </article>

        <article class="season-card">
          <header class="card-head">
            <span class="card-eyebrow">Recent Form</span>
            <span class="card-status" data-slot="streak-now">—</span>
          </header>
          <div class="form-strip" data-slot="form-strip"></div>
          <div class="run-grid" data-slot="runs"></div>
        </article>
      </div>

      <article class="season-card">
        <header class="card-head">
          <span class="card-eyebrow">Month by Month</span>
          <span class="card-status">W · L</span>
        </header>
        <div class="month-list" data-slot="months"></div>
      </article>

      <article class="season-card season-next">
        <header class="card-head">
          <span class="card-eyebrow">Up Next</span>
        </header>
        <div class="next-body" data-slot="next"></div>
      </article>

    </section>

    <footer class="stage-foot">
      <span>Phillies Wire · Season at a Glance</span>
      <span class="foot-sep">·</span>
      <span data-slot="foot-generated">—</span>
      <span class="foot-sep">·</span>
      <a href="../" class="foot-link">← Command Center</a>
    </footer>
  </main>

  </div><!-- /.dash-app -->

    </p>

  <script type="module">
    import { mountWireBanner } from "../../shared/wire-banner.mjs";
    mountWireBanner("[data-wire-banner]");

  <script type="module" src="./season.js"></script>
