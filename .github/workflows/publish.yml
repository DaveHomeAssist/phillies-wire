name: Publish Phillies Wire

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: phillies-wire-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Run crawl
        run: node crawl.mjs

      - name: Run enrich
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node enrich.mjs

      - name: Run render
        run: node render.mjs

      - name: Verify render
        run: node verify.mjs

      - name: Assemble site artifact
        run: |
          mkdir -p site
          cp phillies-wire-output.html site/index.html
          cp phillies-wire.css site/phillies-wire.css
          cp tokens.css site/tokens.css
          cp status.json site/status.json

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phillies-wire-diagnostics
          if-no-files-found: ignore
          path: |
            phillies-wire-data.json
            phillies-wire-output.html
            status.json
            crawl-error.log
            enrich-error.log

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish summary
        if: always()
        run: |
          echo "## Phillies Wire publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "- Page URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Diagnostics artifact: phillies-wire-diagnostics" >> "$GITHUB_STEP_SUMMARY"
