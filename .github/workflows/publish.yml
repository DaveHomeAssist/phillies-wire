name: Publish Phillies Wire

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"
    - cron: "*/15 16-23,0-5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: phillies-wire-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node run.mjs

      - name: Persist archive snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html archive.json archive issues
          if git diff --cached --quiet; then
            echo "No archive snapshot changes to commit."
          else
            git commit -m "Update published issue for $(date -u '+%Y-%m-%d')"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phillies-wire-diagnostics
          if-no-files-found: ignore
          path: |
            phillies-wire-data.json
            phillies-wire-output.html
            archive.json
            archive/index.html
            status.json
            crawl-error.log
            enrich-error.log

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish summary
        if: always()
        run: |
          echo "## Phillies Wire publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "- Page URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Diagnostics artifact: phillies-wire-diagnostics" >> "$GITHUB_STEP_SUMMARY"
