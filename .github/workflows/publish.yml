name: Publish Phillies Wire

on:
  workflow_dispatch:
    inputs:
      issue_mode:
        description: "Pipeline mode for manual publish"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - daily
      test_recipients:
        description: "Comma-separated recipient override for manual test sends. Leave blank to use the subscriber list."
        required: false
        default: ""
        type: string
  schedule:
    # Daily morning publish. 13:00 UTC = 09:00 ET (EDT) / 08:00 ET (EST).
    - cron: "0 13 * * *"
    # Game-window refresh every 15 minutes. The two crons below cover
    # both EST and EDT so the site stays fresh year-round:
    #   EDT (Mar 2nd Sunday - Nov 1st Sunday): 12:00-01:00 ET == 16:00-05:00 UTC
    #   EST (Nov 1st Sunday - Mar 2nd Sunday): 12:00-01:00 ET == 17:00-06:00 UTC
    # The pipeline is idempotent and cheap, so overlapping runs are harmless
    # and the concurrency group prevents races.
    - cron: "*/15 16-23,0-5 * * *"
    - cron: "*/15 17-23,0-6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: phillies-wire-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      # Actions pinned by SHA per GitHub's Security hardening guide.
      # Update the comments and SHAs when bumping versions.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      # The 13:00 UTC schedule gets the full pipeline (crawl + enrich +
      # render + verify + deliver). Manual dispatch defaults to the safer
      # live-refresh path unless issue_mode=daily is selected. Every other
      # schedule (the game-window */15 crons) also gets the live-refresh path:
      # crawl preserves the morning's editorial copy, enrich + deliver are
      # skipped. This stops the refresh from burning Anthropic tokens and
      # spamming email recipients every 15 minutes during a game.
      - name: Determine issue mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.issue_mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          else
            echo "mode=live" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline
        env:
          ISSUE_MODE: ${{ steps.mode.outputs.mode }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASSWORD }}
          # A manual dispatch may override recipients for a scoped test send;
          # scheduled runs (inputs empty) always use the subscriber list.
          DELIVERY_RECIPIENTS: ${{ (github.event.inputs.test_recipients != '' && github.event.inputs.test_recipients) || secrets.DELIVERY_RECIPIENTS }}
          # Active Buttondown subscribers (the site Subscribe button) are merged
          # with DELIVERY_RECIPIENTS at send time. Best-effort: if unset/down,
          # delivery falls back to DELIVERY_RECIPIENTS.
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}

        run: node run.mjs

      # Deploy FIRST so Pages publishes every successful build, even if the
      # commit-back step loses a race with another concurrent run.
      # Prior bug: Persist archive snapshot would fail on a rejected push and
      # gate Deploy behind it, dropping deploys entirely. See Sprint 2026-W17.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@89ef406dd8d7e03cfd12d9e0a4a378f454709029 # v4.3.5
        with:
          name: phillies-wire-diagnostics
          if-no-files-found: ignore
          path: |
            phillies-wire-data.json
            phillies-wire-output.html
            archive.json
            archive/index.html
            status.json
            crawl-error.log
            enrich-error.log

      # Commit-back is best-effort — if it races, the deploy already shipped
      # and the next cron picks up the changes. continue-on-error makes the
      # whole workflow still report success when the archive push is rejected.
      - name: Persist archive snapshot
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A \
            index.html archive.json archive issues \
            status.json latest.json delivery-status.json \
            robots.txt sitemap.xml feed.xml manifest.webmanifest favicon.svg og-default.svg
          if git diff --cached --quiet; then
            echo "No archive snapshot changes to commit."
            exit 0
          fi
          git commit -m "Update published issue for $(date -u '+%Y-%m-%d')"
          # Retry-with-rebase: handle race with a concurrent push.
          for attempt in 1 2 3; do
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              echo "Pushed archive snapshot on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; rebasing on latest remote and retrying."
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
          done
          echo "::warning::Persist archive snapshot could not push after 3 attempts; deploy already shipped. Next cron will catch up."
          exit 0

      - name: Publish summary
        if: always()
        run: |
          echo "## Phillies Wire publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "- Page URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Diagnostics artifact: phillies-wire-diagnostics" >> "$GITHUB_STEP_SUMMARY"

      - name: Health check (post-deploy)
        if: success()
        continue-on-error: true
        env:
          PHILLIES_WIRE_BASE_URL: ${{ steps.deployment.outputs.page_url }}
          PHILLIES_WIRE_MAX_AGE_MIN: "60"
          PHILLIES_WIRE_WEBHOOK: ${{ secrets.PHILLIES_WIRE_WEBHOOK }}
        run: node scripts/health-check.mjs
